<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PipeNet SDF Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #0f1115; font-family: "Segoe UI", sans-serif; }
    .canvas-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
    canvas:active { cursor: grabbing; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #10b981; }
  </style>
</head>
<body class="text-white">
  <div class="canvas-container" id="sdf-container">
    <div class="absolute top-4 left-4 bg-gray-900/90 backdrop-blur-md p-5 rounded-2xl shadow-2xl border border-gray-700/50 z-10 w-72">
      <h1 class="text-xl font-bold mb-4 text-emerald-400 flex items-center gap-2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        SDF 배관망 뷰어
      </h1>
      <label class="flex justify-center items-center w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2.5 px-4 rounded-xl cursor-pointer transition-colors">
        Pipenet SDF 열기
        <input id="sdf-file" type="file" accept=".sdf" class="hidden">
      </label>
      <div class="mt-4 flex gap-2">
        <button id="sdf-btn-pan" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-xs font-semibold py-2 px-2 rounded-lg border-2 border-emerald-500">이동 모드</button>
        <button id="sdf-btn-select" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-xs font-semibold py-2 px-2 rounded-lg border-2 border-transparent">영역 선택</button>
      </div>
      <button id="sdf-btn-crop" class="mt-2 w-full bg-red-600 hover:bg-red-500 text-white text-xs font-semibold py-2 px-4 rounded-lg hidden shadow-lg">선택 영역 외 삭제</button>
      <div id="sdf-status" class="mt-3 text-xs font-medium text-yellow-400 hidden animate-pulse">처리 중...</div>
    </div>
    <div id="sdf-filter-panel" class="absolute top-4 right-4 bg-gray-900/90 backdrop-blur-md p-4 rounded-2xl shadow-2xl border border-gray-700/50 z-10 w-56 hidden max-h-[calc(100vh-2rem)] flex-col">
      <h2 class="text-sm font-bold mb-3 text-gray-200">필터 설정</h2>
      <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-4">
        <div>
          <div class="flex justify-between items-end mb-2 border-b border-gray-700 pb-1">
            <span class="text-xs font-semibold text-emerald-400">레이어</span>
            <button id="sdf-toggle-layers" class="text-[10px] text-gray-400 hover:text-white">전체 전환</button>
          </div>
          <div id="sdf-layer-list" class="space-y-1"></div>
        </div>
        <div>
          <div class="flex justify-between items-end mb-2 border-b border-gray-700 pb-1">
            <span class="text-xs font-semibold text-orange-400">객체 타입</span>
            <button id="sdf-toggle-types" class="text-[10px] text-gray-400 hover:text-white">전체 전환</button>
          </div>
          <div id="sdf-type-list" class="space-y-1"></div>
        </div>
      </div>
      <button id="sdf-btn-remove-hidden" class="mt-3 w-full bg-red-600/80 hover:bg-red-500 text-white text-[11px] py-2 rounded-lg">숨겨진 항목 영구 삭제</button>
    </div>
    <canvas id="sdf-canvas"></canvas>
  </div>
  <script>
    const sdfLayerColors = ["#ef4444", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4"];

    class BaseViewer {
      constructor(prefix) {
        this.prefix = prefix;
        this.canvas = document.getElementById(`${prefix}-canvas`);
        this.ctx = this.canvas.getContext("2d");
        this.statusEl = document.getElementById(`${prefix}-status`);
        this.data = null;
        this.extents = null;
        this.transform = { x: 0, y: 0, scale: 1 };
        this.currentMode = "pan";
        this.isDragging = false;
        this.dragStart = { x: 0, y: 0 };
        this.selectionStart = null;
        this.selectionEnd = null;
        this.mouseX = 0;
        this.mouseY = 0;
        this.hoveredElement = null;
        this.availableLayers = new Set();
        this.availableTypes = new Set();
        this.activeLayers = new Set();
        this.activeTypes = new Set();
        this.currentSelectionStats = null;
        this.showHeadBoxes = false;
        this.selectedRectData = null;
        this.initEvents();
        this.resizeCanvas();
        window.addEventListener("resize", () => this.resizeCanvas());
      }

      resizeCanvas() {
        const rect = this.canvas.parentElement.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        this.canvas.width = rect.width * ratio;
        this.canvas.height = rect.height * ratio;
        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
        this.ctx.scale(ratio, ratio);
        this.render();
      }

      screenToData(screenX, screenY) {
        if (!this.extents) return { x: 0, y: 0 };
          const cx = this.canvas.clientWidth / 2;
          const cy = this.canvas.clientHeight / 2;
        const dataCx = (this.extents.minX + this.extents.maxX) / 2;
        const dataCy = (this.extents.minY + this.extents.maxY) / 2;
        return {
          x: (screenX - cx - this.transform.x) / this.transform.scale + dataCx,
          y: (screenY - cy - this.transform.y) / -this.transform.scale + dataCy,
        };
      }

      resetView() {
        if (!this.extents) return;
        const w = this.extents.maxX - this.extents.minX;
        const h = this.extents.maxY - this.extents.minY;
          this.transform.scale = Math.min((this.canvas.clientWidth * 0.85) / (w || 1), (this.canvas.clientHeight * 0.85) / (h || 1));
        this.transform.x = 0;
        this.transform.y = 0;
      }

      setMode(mode) {
        this.currentMode = mode;
        const btnPan = document.getElementById(`${this.prefix}-btn-pan`);
        const btnSelect = document.getElementById(`${this.prefix}-btn-select`);
        btnPan.classList.toggle("border-emerald-500", mode === "pan");
        btnPan.classList.toggle("border-transparent", mode !== "pan");
        btnSelect.classList.toggle("border-emerald-500", mode === "select");
        btnSelect.classList.toggle("border-transparent", mode !== "select");
        this.canvas.style.cursor = mode === "pan" ? "grab" : "crosshair";
      }

      renderBase() {
        this.ctx.fillStyle = "#121212";
        this.ctx.fillRect(0, 0, this.canvas.clientWidth, this.canvas.clientHeight);
        if (!this.data || !this.extents) return false;
        this.ctx.save();
          const cx = this.canvas.clientWidth / 2;
          const cy = this.canvas.clientHeight / 2;
        const dataCx = (this.extents.minX + this.extents.maxX) / 2;
        const dataCy = (this.extents.minY + this.extents.maxY) / 2;
        this.ctx.translate(cx + this.transform.x, cy + this.transform.y);
        this.ctx.scale(this.transform.scale, -this.transform.scale);
        this.ctx.translate(-dataCx, -dataCy);
        return true;
      }

      renderOverlay() {
        if (this.currentMode === "select" && this.selectionStart && this.selectionEnd) {
          this.ctx.save();
          this.ctx.fillStyle = "rgba(59, 130, 246, 0.15)";
          this.ctx.strokeStyle = "rgba(59, 130, 246, 0.8)";
          this.ctx.lineWidth = 1;
          this.ctx.setLineDash([5, 5]);
          const x = Math.min(this.selectionStart.x, this.selectionEnd.x);
          const y = Math.min(this.selectionStart.y, this.selectionEnd.y);
          const w = Math.abs(this.selectionEnd.x - this.selectionStart.x);
          const h = Math.abs(this.selectionEnd.y - this.selectionStart.y);
          this.ctx.fillRect(x, y, w, h);
          this.ctx.strokeRect(x, y, w, h);
          this.ctx.restore();
        }
        if (this.selectedRectData) {
          const p1 = this.dataToScreen(this.selectedRectData.minX, this.selectedRectData.maxY);
          const p2 = this.dataToScreen(this.selectedRectData.maxX, this.selectedRectData.minY);
          const x = Math.min(p1.x, p2.x);
          const y = Math.min(p1.y, p2.y);
          const w = Math.abs(p2.x - p1.x);
          const h = Math.abs(p2.y - p1.y);
          this.ctx.save();
          this.ctx.fillStyle = "rgba(59, 130, 246, 0.10)";
          this.ctx.strokeStyle = "rgba(59, 130, 246, 0.75)";
          this.ctx.lineWidth = 1;
          this.ctx.setLineDash([5, 5]);
          this.ctx.fillRect(x, y, w, h);
          this.ctx.strokeRect(x, y, w, h);
          this.ctx.restore();
        }
      }

      emitSelection(payload) {
        window.parent.postMessage({ source: "sdf-viewer", type: "selection", payload }, "*");
      }

      dataToScreen(x, y) {
        if (!this.extents) return { x: 0, y: 0 };
        const cx = this.canvas.clientWidth / 2;
        const cy = this.canvas.clientHeight / 2;
        const dataCx = (this.extents.minX + this.extents.maxX) / 2;
        const dataCy = (this.extents.minY + this.extents.maxY) / 2;
        return {
          x: (x - dataCx) * this.transform.scale + cx + this.transform.x,
          y: (dataCy - y) * this.transform.scale + cy + this.transform.y,
        };
      }
    }

    class SdfViewer extends BaseViewer {
      constructor() {
        super("sdf");
      }

      initEvents() {
        const btnPan = document.getElementById("sdf-btn-pan");
        const btnSelect = document.getElementById("sdf-btn-select");
        const btnCrop = document.getElementById("sdf-btn-crop");
        btnPan.addEventListener("click", () => {
          this.selectionStart = null;
          this.selectionEnd = null;
          this.currentSelectionStats = null;
          this.showHeadBoxes = false;
          this.selectedRectData = null;
          btnCrop.classList.add("hidden");
          this.setMode("pan");
          this.render();
          this.emitSelection(null);
        });
        btnSelect.addEventListener("click", () => this.setMode("select"));
        btnCrop.addEventListener("click", () => this.cropAction());
        this.canvas.addEventListener("mousedown", (event) => this.onMouseDown(event));
        window.addEventListener("mouseup", () => this.onMouseUp());
        window.addEventListener("mousemove", (event) => this.onMouseMove(event));
        this.canvas.addEventListener("wheel", (event) => this.onWheel(event), { passive: false });
        document.getElementById("sdf-file").addEventListener("change", (event) => this.handleFileUpload(event));
        document.getElementById("sdf-toggle-layers").addEventListener("click", () => this.toggleAll(this.activeLayers, this.availableLayers));
        document.getElementById("sdf-toggle-types").addEventListener("click", () => this.toggleAll(this.activeTypes, this.availableTypes));
        document.getElementById("sdf-btn-remove-hidden").addEventListener("click", () => this.removeHiddenAction());
        window.addEventListener("message", (event) => {
          if (!event.data || event.data.source !== "command-studio") return;
          if (event.data.type === "show-head-boxes") {
            this.showHeadBoxes = Boolean(event.data.enabled);
            this.render();
          }
        });
      }

      toggleAll(activeSet, availableSet) {
        const allChecked = activeSet.size === availableSet.size;
        activeSet.clear();
        if (!allChecked) availableSet.forEach((item) => activeSet.add(item));
        this.buildFilterUI();
        this.render();
      }

      onMouseDown(event) {
        const rect = this.canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        if (this.currentMode === "pan") {
          this.isDragging = true;
          this.dragStart = { x: event.clientX, y: event.clientY };
          return;
        }
        if (this.currentMode === "select") {
          this.selectionStart = { x, y };
          this.selectionEnd = { x, y };
          document.getElementById("sdf-btn-crop").classList.add("hidden");
        }
      }

      onMouseUp() {
        if (this.currentMode === "pan") {
          this.isDragging = false;
          return;
        }
        if (this.currentMode === "select" && this.selectionStart) {
          const dx = this.selectionEnd.x - this.selectionStart.x;
          const dy = this.selectionEnd.y - this.selectionStart.y;
          if (Math.abs(dx) > 5 && Math.abs(dy) > 5) {
            document.getElementById("sdf-btn-crop").classList.remove("hidden");
            this.handleSelectionFinished();
          } else {
            this.selectionStart = null;
            this.selectionEnd = null;
            this.selectedRectData = null;
            document.getElementById("sdf-btn-crop").classList.add("hidden");
            this.emitSelection(null);
          }
          this.render();
        }
      }

      onMouseMove(event) {
        const rect = this.canvas.getBoundingClientRect();
        this.mouseX = event.clientX - rect.left;
        this.mouseY = event.clientY - rect.top;
        if (this.currentMode === "pan" && this.isDragging) {
          this.transform.x += event.clientX - this.dragStart.x;
          this.transform.y += event.clientY - this.dragStart.y;
          this.dragStart = { x: event.clientX, y: event.clientY };
          this.render();
          return;
        }
        if (this.currentMode === "select" && this.selectionStart && event.buttons === 1) {
          this.selectionEnd = { x: this.mouseX, y: this.mouseY };
          this.render();
          return;
        }
        this.findHoveredElement();
      }

      onWheel(event) {
        event.preventDefault();
        const rect = this.canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const factor = Math.exp(-event.deltaY * 0.0015);
        const cx = this.canvas.width / 2;
        const cy = this.canvas.height / 2;
        this.transform.x -= (x - cx - this.transform.x) * (factor - 1);
        this.transform.y -= (y - cy - this.transform.y) * (factor - 1);
        this.transform.scale *= factor;
        this.transform.scale = Math.max(0.000001, Math.min(this.transform.scale, 100000));
        this.render();
      }

      handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        this.statusEl.classList.remove("hidden");
        this.statusEl.textContent = "SDF 파싱 중...";
        const reader = new FileReader();
        reader.onload = (loadEvent) => {
          setTimeout(() => {
            try {
              this.data = this.parseSDF(loadEvent.target.result);
              this.extractFilters();
              this.updateExtents();
              this.resetView();
              this.selectionStart = null;
              this.selectionEnd = null;
              this.currentSelectionStats = null;
              this.showHeadBoxes = false;
              this.selectedRectData = null;
              this.render();
              this.statusEl.classList.add("hidden");
              this.emitSelection(null);
            } catch (error) {
              console.error(error);
              alert("SDF 파싱 오류가 발생했습니다.");
              this.statusEl.classList.add("hidden");
            }
          }, 50);
        };
        reader.readAsText(file);
      }

      parseSDF(xmlStr) {
        const doc = new DOMParser().parseFromString(xmlStr, "text/xml");
        const parsed = { nodes: {}, pipes: [], elements: [] };
        doc.querySelectorAll("Node").forEach((node) => {
          const label = node.getAttribute("label");
          const pos = node.querySelector("Position");
          if (!pos) return;
          const item = {
            id: label,
            x: parseFloat(pos.getAttribute("x")),
            y: parseFloat(pos.getAttribute("y")),
            type: "Node",
            layer: "Nodes/Fittings",
            label,
          };
          parsed.nodes[label] = item;
          parsed.elements.push(item);
        });

        const layerColorsMap = {};
        let colorIdx = 0;
        doc.querySelectorAll("Pipe-set").forEach((set) => {
          let pipeLayer = "Default Pipe";
          const typeName = set.querySelector("Pipe-type Name");
          if (typeName) pipeLayer = typeName.textContent.trim();
          if (!layerColorsMap[pipeLayer]) {
            layerColorsMap[pipeLayer] = sdfLayerColors[colorIdx % sdfLayerColors.length];
            colorIdx += 1;
          }
          set.querySelectorAll("Pipe").forEach((pipe) => {
            const inNode = pipe.getAttribute("input");
            const outNode = pipe.getAttribute("output");
            if (!parsed.nodes[inNode] || !parsed.nodes[outNode]) return;
            const waypoints = [];
            pipe.querySelectorAll("Waypoints Position").forEach((wp) => {
              waypoints.push({ x: parseFloat(wp.getAttribute("x")), y: parseFloat(wp.getAttribute("y")) });
            });
            const fittings = [];
            pipe.querySelectorAll("Fittings > *").forEach((fitting) => fittings.push(fitting.tagName.toLowerCase()));
            parsed.pipes.push({
              type: "Pipe",
              layer: pipeLayer,
              label: pipe.getAttribute("label") || "",
              in: parsed.nodes[inNode],
              out: parsed.nodes[outNode],
              waypoints,
              color: layerColorsMap[pipeLayer],
              bore: parseFloat(pipe.getAttribute("bore") || 0),
              length: parseFloat(pipe.getAttribute("length") || 0),
              cFactor: parseFloat(pipe.getAttribute("roughness-or-c") || 0),
              fittings,
            });
          });
        });

        doc.querySelectorAll("Nozzle").forEach((nozzle) => {
          const node = parsed.nodes[nozzle.getAttribute("input")];
          if (!node) return;
          parsed.elements.push({ type: "Nozzle", layer: "Equipment", x: node.x, y: node.y, label: nozzle.getAttribute("label") || "" });
        });
        doc.querySelectorAll("Pump-fan, Elastomeric-valve, Gate-valve, Butterfly-valve").forEach((equipment) => {
          const node = parsed.nodes[equipment.getAttribute("input")];
          if (!node) return;
          const type = equipment.tagName.toLowerCase().includes("valve") ? "Valve" : "Pump";
          parsed.elements.push({ type, layer: "Equipment", x: node.x, y: node.y, label: equipment.getAttribute("label") || "" });
        });
        doc.querySelectorAll("Text-element").forEach((text) => {
          const pos = text.querySelector("Position");
          const value = text.querySelector("Text");
          if (!pos || !value) return;
          parsed.elements.push({ type: "Text", layer: "Annotations", x: parseFloat(pos.getAttribute("x")), y: parseFloat(pos.getAttribute("y")), text: value.textContent });
        });
        return parsed;
      }

      extractFilters() {
        this.availableLayers.clear();
        this.availableTypes.clear();
        this.activeLayers.clear();
        this.activeTypes.clear();
        this.data.elements.forEach((element) => {
          this.availableTypes.add(element.type);
          this.availableLayers.add(element.layer);
        });
        this.data.pipes.forEach((pipe) => {
          this.availableTypes.add(pipe.type);
          this.availableLayers.add(pipe.layer);
        });
        this.availableLayers.forEach((layer) => this.activeLayers.add(layer));
        this.availableTypes.forEach((type) => this.activeTypes.add(type));
        const panel = document.getElementById("sdf-filter-panel");
        const layerList = document.getElementById("sdf-layer-list");
        const typeList = document.getElementById("sdf-type-list");
        panel.classList.remove("hidden");
        panel.classList.add("flex");
        layerList.innerHTML = "";
        typeList.innerHTML = "";
        Array.from(this.availableLayers).sort().forEach((layer) => {
          const row = document.createElement("div");
          row.className = "flex items-center gap-1.5";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = this.activeLayers.has(layer);
          checkbox.className = "w-3 h-3 bg-gray-700 rounded cursor-pointer";
          checkbox.addEventListener("change", (event) => {
            if (event.target.checked) this.activeLayers.add(layer);
            else this.activeLayers.delete(layer);
            this.render();
          });
          const label = document.createElement("label");
          label.className = "text-[11px] text-gray-300 truncate cursor-pointer select-none";
          label.textContent = layer;
          row.append(checkbox, label);
          layerList.appendChild(row);
        });
        Array.from(this.availableTypes).sort().forEach((type) => {
          const row = document.createElement("div");
          row.className = "flex items-center gap-1.5";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = this.activeTypes.has(type);
          checkbox.className = "w-3 h-3 bg-gray-700 rounded cursor-pointer";
          checkbox.addEventListener("change", (event) => {
            if (event.target.checked) this.activeTypes.add(type);
            else this.activeTypes.delete(type);
            this.render();
          });
          const label = document.createElement("label");
          label.className = "text-[11px] text-gray-300 truncate cursor-pointer select-none";
          label.textContent = type;
          row.append(checkbox, label);
          typeList.appendChild(row);
        });
      }

      updateExtents() {
        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;
        this.data.elements.forEach((element) => {
          minX = Math.min(minX, element.x);
          minY = Math.min(minY, element.y);
          maxX = Math.max(maxX, element.x);
          maxY = Math.max(maxY, element.y);
        });
        this.data.pipes.forEach((pipe) => {
          [pipe.in, ...(pipe.waypoints || []), pipe.out].forEach((point) => {
            minX = Math.min(minX, point.x);
            minY = Math.min(minY, point.y);
            maxX = Math.max(maxX, point.x);
            maxY = Math.max(maxY, point.y);
          });
        });
        this.extents = minX === Infinity ? { minX: 0, minY: 0, maxX: 100, maxY: 100 } : { minX, minY, maxX, maxY };
      }

      ptToSegmentDist(p, v, w) {
        const l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
        if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        const proj = { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) };
        return Math.hypot(p.x - proj.x, p.y - proj.y);
      }

      findHoveredElement() {
        if (!this.data) return;
        const pt = this.screenToData(this.mouseX, this.mouseY);
        const tolerance = 6 / this.transform.scale;
        let closest = null;
        let minDist = tolerance;
        this.data.elements.forEach((element) => {
          if (!this.activeLayers.has(element.layer) || !this.activeTypes.has(element.type) || element.type === "Text") return;
          const dist = Math.hypot(element.x - pt.x, element.y - pt.y);
          if (dist < minDist) {
            minDist = dist;
            closest = element;
          }
        });
        this.data.pipes.forEach((pipe) => {
          if (!this.activeLayers.has(pipe.layer)) return;
          const points = [pipe.in, ...(pipe.waypoints || []), pipe.out];
          for (let idx = 0; idx < points.length - 1; idx += 1) {
            const dist = this.ptToSegmentDist(pt, points[idx], points[idx + 1]);
            if (dist < minDist) {
              minDist = dist;
              closest = pipe;
            }
          }
        });
        if (this.hoveredElement !== closest) {
          this.hoveredElement = closest;
          this.render();
        }
      }

      collectSelectionStats(sel) {
        const isInside = (x, y) => x >= sel.minX && x <= sel.maxX && y >= sel.minY && y <= sel.maxY;
        const elements = this.data.elements.filter((element) => isInside(element.x, element.y));
        const pipes = this.data.pipes.filter((pipe) => {
          const points = [pipe.in, ...(pipe.waypoints || []), pipe.out];
          return points.every((point) => isInside(point.x, point.y));
        });
        const allPoints = [];
        elements.forEach((element) => allPoints.push({ x: element.x, y: element.y }));
        pipes.forEach((pipe) => [pipe.in, ...(pipe.waypoints || []), pipe.out].forEach((point) => allPoints.push(point)));
        let totalPipeLength = 0;
        let mainLines = 0;
        let branchLines = 0;
        let fittings = 0;
        const headBoxes = [];
        pipes.forEach((pipe) => {
          totalPipeLength += pipe.length * 1000;
          if (pipe.bore * 1000 >= 50) mainLines += 1;
          if (pipe.bore * 1000 <= 40) branchLines += 1;
          fittings += pipe.fittings.length;
        });
        elements.forEach((element) => {
          if (element.type !== "Nozzle") return;
          headBoxes.push({
            minX: element.x - 85,
            minY: element.y - 85,
            maxX: element.x + 85,
            maxY: element.y + 85,
          });
        });
        const aspectRatio = (() => {
          if (!allPoints.length) return 0;
          const xs = allPoints.map((point) => point.x);
          const ys = allPoints.map((point) => point.y);
          const width = Math.max(Math.max(...xs) - Math.min(...xs), 1);
          const height = Math.max(Math.max(...ys) - Math.min(...ys), 1);
          return width / height;
        })();
        return {
          label: "SDF Viewer",
          rect: sel,
          heads: elements.filter((element) => element.type === "Nozzle").length,
          pipeSegments: pipes.length,
          mainLines,
          branchLines,
          fittings,
          valves: elements.filter((element) => element.type === "Valve" || element.type === "Pump").length,
          headBoxes,
          aspectRatio,
          totalPipeLength,
          objectCount: elements.length + pipes.length,
        };
      }

      handleSelectionFinished() {
        if (!this.selectionStart || !this.selectionEnd || !this.data) return;
        const p1 = this.screenToData(this.selectionStart.x, this.selectionStart.y);
        const p2 = this.screenToData(this.selectionEnd.x, this.selectionEnd.y);
        const selection = {
          minX: Math.min(p1.x, p2.x),
          maxX: Math.max(p1.x, p2.x),
          minY: Math.min(p1.y, p2.y),
          maxY: Math.max(p1.y, p2.y),
        };
        this.selectedRectData = selection;
        this.currentSelectionStats = this.collectSelectionStats(selection);
        this.showHeadBoxes = false;
        this.selectionStart = null;
        this.selectionEnd = null;
        this.emitSelection(this.currentSelectionStats);
      }

      render() {
        if (!this.renderBase()) return;
        const ctx = this.ctx;
        if (this.activeTypes.has("Pipe")) {
          this.data.pipes.forEach((pipe) => {
            if (!this.activeLayers.has(pipe.layer)) return;
            ctx.beginPath();
            const isHovered = this.hoveredElement === pipe;
            ctx.strokeStyle = isHovered ? "#ffffff" : pipe.color || "#ffffff";
            ctx.lineWidth = isHovered ? Math.max(4 / this.transform.scale, 1) : Math.max(2 / this.transform.scale, 0.5);
            ctx.moveTo(pipe.in.x, pipe.in.y);
            (pipe.waypoints || []).forEach((wp) => ctx.lineTo(wp.x, wp.y));
            ctx.lineTo(pipe.out.x, pipe.out.y);
            ctx.stroke();
          });
        }
        this.data.elements.forEach((element) => {
          if (!this.activeLayers.has(element.layer) || !this.activeTypes.has(element.type)) return;
          const isHovered = this.hoveredElement === element;
          if (element.type === "Node") {
            ctx.beginPath();
            ctx.fillStyle = isHovered ? "#ffffff" : "#4b5563";
            ctx.arc(element.x, element.y, (isHovered ? 4 : 2) / this.transform.scale, 0, Math.PI * 2);
            ctx.fill();
          } else if (element.type === "Nozzle") {
            ctx.beginPath();
            ctx.fillStyle = "#ef4444";
            ctx.arc(element.x, element.y, (isHovered ? 6 : 4) / this.transform.scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 1 / this.transform.scale;
            ctx.stroke();
          } else if (element.type === "Pump" || element.type === "Valve") {
            const size = (isHovered ? 12 : 8) / this.transform.scale;
            ctx.fillStyle = "#3b82f6";
            ctx.fillRect(element.x - size / 2, element.y - size / 2, size, size);
          } else if (element.type === "Text") {
            ctx.save();
            ctx.translate(element.x, element.y);
            ctx.scale(1, -1);
            ctx.font = `${Math.max(60 / this.transform.scale, 10)}px sans-serif`;
            ctx.fillStyle = "#facc15";
            ctx.fillText(element.text, 0, 0);
            ctx.restore();
          }
        });
        if (this.showHeadBoxes && this.currentSelectionStats && this.currentSelectionStats.headBoxes) {
          ctx.save();
          ctx.strokeStyle = "#ff4d6d";
          ctx.fillStyle = "rgba(255, 77, 109, 0.08)";
          ctx.lineWidth = Math.max(1 / this.transform.scale, 0.6);
          ctx.setLineDash([24 / this.transform.scale, 14 / this.transform.scale]);
          this.currentSelectionStats.headBoxes.forEach((box) => {
            ctx.fillRect(box.minX, box.minY, box.maxX - box.minX, box.maxY - box.minY);
            ctx.strokeRect(box.minX, box.minY, box.maxX - box.minX, box.maxY - box.minY);
          });
          ctx.restore();
        }
        this.ctx.restore();
        this.renderOverlay();
        if (this.hoveredElement) this.drawTooltip(this.hoveredElement);
      }

      drawTooltip(element) {
        const ctx = this.ctx;
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        const lines = element.type === "Pipe"
          ? [`[Pipe] ${element.label || "-"}`, `Layer: ${element.layer}`, `Bore: ${(element.bore * 1000).toFixed(0)} mm`, `Length: ${element.length} m`, `Fittings: ${element.fittings.length}`]
          : [`[${element.type}] ${element.label || "-"}`, `Layer: ${element.layer}`];
        ctx.font = '12px "Segoe UI", sans-serif';
        let maxW = 0;
        lines.forEach((line) => { maxW = Math.max(maxW, ctx.measureText(line).width); });
        const pad = 10;
        const tw = maxW + pad * 2;
        const th = lines.length * 18 + pad * 2;
        let tx = this.mouseX + 15;
        let ty = this.mouseY + 15;
        if (tx + tw > this.canvas.clientWidth) tx = this.mouseX - tw - 15;
        if (ty + th > this.canvas.clientHeight) ty = this.mouseY - th - 15;
        ctx.fillStyle = "rgba(15, 23, 42, 0.9)";
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(tx, ty, tw, th, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#f8fafc";
        lines.forEach((line, index) => ctx.fillText(line, tx + pad, ty + pad + 12 + index * 18));
        ctx.restore();
      }

      cropAction() {
        if (!this.data || !this.selectedRectData) return;
        const sel = this.selectedRectData;
        const isInside = (x, y) => x >= sel.minX && x <= sel.maxX && y >= sel.minY && y <= sel.maxY;
        this.data.elements = this.data.elements.filter((element) => isInside(element.x, element.y));
        this.data.pipes = this.data.pipes.filter((pipe) => [pipe.in, ...(pipe.waypoints || []), pipe.out].some((point) => isInside(point.x, point.y)));
        this.selectionStart = null;
        this.selectionEnd = null;
        this.currentSelectionStats = null;
        this.showHeadBoxes = false;
        this.selectedRectData = null;
        document.getElementById("sdf-btn-crop").classList.add("hidden");
        this.updateExtents();
        this.resetView();
        this.render();
        this.emitSelection(null);
      }

      removeHiddenAction() {
        if (!this.data) return;
        this.data.elements = this.data.elements.filter((element) => this.activeLayers.has(element.layer) && this.activeTypes.has(element.type));
        this.data.pipes = this.data.pipes.filter((pipe) => this.activeLayers.has(pipe.layer) && this.activeTypes.has(pipe.type));
        this.extractFilters();
        this.updateExtents();
        this.resetView();
        this.currentSelectionStats = null;
        this.showHeadBoxes = false;
        this.selectedRectData = null;
        this.render();
        this.emitSelection(null);
      }
    }

    const sdfApp = new SdfViewer();
  </script>
</body>
</html>
